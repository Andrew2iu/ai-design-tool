version: '3.8'

services:
  # ---- AI 后端 ----
  backend:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/python/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/python:/app

  # ---- MCP 服务 ----
  # MCP Server 现在以 HTTP/SSE 模式运行，暴露 /sse 和 /messages 端点。
  mcp-server:
    build:
      context: ./backend/node
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend

  # ---- 数据库 ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: design_studio
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d design_studio"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- 缓存 ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ---- 对象存储 ----
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  # ---- 可观测性 ----
  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  pgdata:
  miniodata:
